<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drift Physics Tuner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>

<!-- Real game classes -->
<script src="../js/data/Colliders.js"></script>
<script src="../js/core/Config.js"></script>
<script src="../js/core/AssetManager.js"></script>
<script src="../js/physics/CollisionPhysics.js"></script>
<script src="../js/physics/VehicleDynamics.js"></script>
<script src="../js/physics/VehiclePhysics.js"></script>
<script src="../js/systems/DriveDust.js"></script>
<script src="../js/systems/CrashDust.js"></script>
<script src="../js/systems/ParticleSystem.js"></script>
<script src="../js/systems/TireMarks.js"></script>
<script src="../js/components/VehicleInput.js"></script>
<script src="../js/rendering/Camera.js"></script>
<script src="../js/rendering/DrawingHelpers.js"></script>
<script src="../js/rendering/VehicleRenderer.js"></script>
<script src="../js/entities/Vehicle.js"></script>
<script src="../js/entities/PlayerTruck.js"></script>

<!-- Test classes -->
<script src="TunerSliders.js"></script>
<script src="TunerHUD.js"></script>
<script src="TestWorld.js"></script>
<script src="JTurnPhysics.js"></script>
<script src="PhysicsOverrides.js"></script>

<!-- Fix asset paths for test/ subfolder -->
<script>
AssetManager.preload = function() {
    const P = '../assets/images/';
    this.images.desertBg  = loadImage(P + 'environment/desertBackground.png');
    this.images.truck     = loadImage(P + 'vehicles/PlayerTruck.png');
    this.images.blueTruck = loadImage(P + 'vehicles/SmugglerTruck.png');
    for (let i = 0; i < 8; i++)
        this.images.buildings[i] = loadImage(P + 'environment/building' + (i+1) + '/texture.png');
    this.images.palm        = loadImage(P + 'environment/props/palmTree/texture.png');
    this.images.camel       = loadImage(P + 'characters/texture.png');
    this.images.camelShadow = loadImage(P + 'characters/shadow.png');
};
</script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { display:flex; height:100vh; overflow:hidden; background:#111; }
main { position:relative; flex:1; }
canvas { display:block !important; }
#panel {
    width:300px; height:100vh; overflow-y:auto; padding:8px 10px;
    background:#1a1a1a; border-left:2px solid #333;
    font-family:'Courier New',monospace; font-size:11px; color:#ccc;
}
#panel::-webkit-scrollbar { width:6px; }
#panel::-webkit-scrollbar-thumb { background:#444; border-radius:3px; }
.gtitle { color:#ff9944; font-size:11px; font-weight:bold; margin:14px 0 4px;
    border-bottom:1px solid #333; padding-bottom:3px; text-transform:uppercase; letter-spacing:1px; }
.gtitle:first-child { margin-top:4px; }
.sr { display:flex; align-items:center; margin:2px 0; height:20px; }
.sr label { flex:1; color:#888; font-size:10px; white-space:nowrap; }
.sr input[type=range] { width:90px; margin:0 4px; accent-color:#ff9944; height:14px; }
.sr .v { width:44px; text-align:right; color:#ff9944; font-weight:bold; font-size:10px; }
.btns { display:flex; gap:6px; margin:10px 0 6px; }
.btns button { flex:1; padding:5px; font-size:10px; font-family:inherit;
    background:#282828; color:#ddd; border:1px solid #444; border-radius:3px; cursor:pointer; }
.btns button:hover { background:#383838; }
.btns button.w { border-color:#ff4444; color:#ff6666; }
#hud { position:absolute; top:8px; left:8px; font:bold 11px 'Courier New',monospace;
    color:#fff; background:rgba(0,0,0,0.65); padding:6px 10px; border-radius:4px;
    pointer-events:none; line-height:1.7; }
#help { position:absolute; bottom:8px; left:8px; font:11px 'Courier New',monospace;
    color:#ddd; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; pointer-events:none; }
</style>
</head>
<body>
<main>
  <div id="hud"></div>
  <div id="help">↑↓ Accel/Brake &nbsp; ←→ Steer &nbsp; R Reset</div>
</main>
<div id="panel"></div>

<script>
let player, cam, particles, tireMarks, world;

function preload() { AssetManager.preload(); }

function setup() {
    createCanvas(windowWidth - 300, windowHeight).parent(document.querySelector('main'));
    rectMode(CENTER); imageMode(CENTER);

    TunerSliders.init(document.getElementById('panel'));
    PhysicsOverrides.install();

    world     = new TestWorld();
    player    = new PlayerTruck(0, 0);
    cam       = new Camera(0.08);
    particles = new ParticleSystem();
    tireMarks = new TireMarks();
}

function draw() {
    player.update(world, null);
    cam.follow(player, width, height);

    const p = player;
    const mm = Math.sqrt(p.momentum.x**2 + p.momentum.y**2);

    if (abs(p.phi) > 0.5 && (abs(p.speed) > 1 || mm > 6))
        tireMarks.addMark(p.x+(p.d/2)*(p.phi/abs(p.phi))*sin((-p.phi/abs(p.phi))*p.th),
            p.y+(p.d/2)*cos(p.th), p.th);
    if (abs(p.speed) > 0.5 || mm > 2)
        particles.spawnDust(p.x, p.y, p.th, p.w, p.d, p.speed, p.phi, p.momentum, p.isReversing());
    particles.update();

    if (keyIsDown(82)) {
        p.x=0;p.y=0;p.th=0;p.phi=0.01;p.speed=1;
        p.momentum.x=0;p.momentum.y=0;p.spinOutUntil=0;
        tireMarks.tracks=[];particles.particles=[];
    }

    background(210, 190, 160);
    cam.begin();
    const bg = AssetManager.images.desertBg;
    if (bg && bg.width > 0) {
        imageMode(CORNER);
        const tw=Config.BG_TILE_SIZE;
        const si=floor((cam.x-width)/tw)-1,ei=ceil((cam.x+width*2)/tw)+1;
        const sj=floor((cam.y-height)/tw)-1,ej=ceil((cam.y+height*2)/tw)+1;
        for(let i=si;i<=ei;i++)for(let j=sj;j<=ej;j++)image(bg,i*tw,j*tw,tw,tw);
        imageMode(CENTER);
    }
    tireMarks.draw(player);
    particles.drawDrive();
    player.draw();
    particles.drawCrash();
    cam.end();

    TunerHUD.update(player, document.getElementById('hud'));
}

function windowResized() { resizeCanvas(windowWidth - 300, windowHeight); }
</script>
</body>
</html>
